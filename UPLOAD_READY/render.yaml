services:
  - type: web
    name: blood-bank-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://your-frontend-vercel-url.com
      # SQLite fallback - Ideally you use Render Postgres and attach it via DATABASE_URL
      - key: DATABASE_URL
        value: sqlite:./data/bloodbank.db
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
